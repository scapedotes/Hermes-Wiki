<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Wiki Translation Pipeline</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { margin-bottom: 20px; }
        #log-container { background: #212529; color: #0dcaf0; padding: 15px; border-radius: 5px; height: 300px; overflow-y: auto; font-family: monospace; }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row">
        <div class="col-md-12 text-center mb-4">
            <h1>Hermes Wiki Translation Pipeline <span class="badge bg-primary">v2.2</span></h1>
            <p class="text-muted">Automated Chinese-to-English translation using Claude 3.5 Sonnet</p>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">Repository Translation</div>
                <div class="card-body">
                    <form id="repo-form">
                        <div class="mb-3">
                            <label class="form-label">Owner</label>
                            <input type="text" class="form-control" id="owner" value="scapedotes">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Repository</label>
                            <input type="text" class="form-control" id="repo" value="Hermes-Wiki">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Branch</label>
                            <input type="text" class="form-control" id="branch" value="master">
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="force" checked>
                            <label class="form-check-label">Force Refresh (Ignore Cache)</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Start Full Translation</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-info text-white">System Status</div>
                <div class="card-body">
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            Mode
                            <span class="badge bg-secondary" id="mode-badge">Local Mode</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            Storage
                            <span class="text-muted small">translations/</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            Worker Pool
                            <span class="badge bg-primary">5 Workers</span>
                        </li>
                    </ul>
                    <div class="mt-4">
                        <h6>Active Tasks</h6>
                        <div id="active-tasks" class="list-group small">
                            <div class="text-center py-3 text-muted">No active tasks</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-12">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">Translation Log</div>
                <div class="card-body">
                    <div id="log-container">
                        <div>[SYSTEM] Pipeline ready...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const logContainer = document.getElementById('log-container');
    const repoForm = document.getElementById('repo-form');
    const activeTasksContainer = document.getElementById('active-tasks');

    function appendLog(msg, type='info') {
        const div = document.createElement('div');
        div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        if (type === 'error') div.style.color = '#ff6b6b';
        logContainer.appendChild(div);
        logContainer.scrollTop = logContainer.scrollHeight;
    }

    repoForm.onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            owner: document.getElementById('owner').value,
            repo: document.getElementById('repo').value,
            branch: document.getElementById('branch').value,
            force: document.getElementById('force').checked
        };
        
        appendLog(`Initiating translation for ${data.owner}/${data.repo}...`);
        
        try {
            const res = await fetch('/translate-repo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            
            if (result.task_id) {
                appendLog(`Task created: ${result.task_id}`);
                pollTask(result.task_id);
            } else {
                appendLog(`Error: ${result.error || 'Failed to start task'}`, 'error');
            }
        } catch (err) {
            appendLog(`Network Error: ${err.message}`, 'error');
        }
    };

    async function pollTask(taskId) {
        const interval = setInterval(async () => {
            try {
                const res = await fetch(`/task-status/${taskId}`);
                const task = await res.json();
                
                updateTaskUI(task);
                
                if (task.status === 'completed') {
                    clearInterval(interval);
                    appendLog(`Task ${taskId} COMPLETED. Successful: ${task.summary.successful}, Failed: ${task.summary.failed}`);
                } else if (task.status === 'failed') {
                    clearInterval(interval);
                    appendLog(`Task ${taskId} FAILED: ${task.error}`, 'error');
                }
            } catch (err) {
                appendLog(`Polling error: ${err.message}`, 'error');
                clearInterval(interval);
            }
        }, 3000);
    }

    function updateTaskUI(task) {
        activeTasksContainer.innerHTML = `
            <div class="list-group-item">
                <div class="d-flex w-100 justify-content-between">
                    <h6 class="mb-1">${task.repo}</h6>
                    <small>${task.status}</small>
                </div>
                <div class="progress mt-2" style="height: 10px;">
                    <div class="progress-bar" role="progressbar" style="width: ${(task.progress.completed / task.progress.total * 100) || 0}%"></div>
                </div>
                <small class="text-muted">${task.progress.completed} / ${task.progress.total} files processed</small>
            </div>
        `;
    }
</script>
</body>
</html>
